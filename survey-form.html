<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <header>
      <h1>Survey Form</h1>
      <p>Functional app built by Mr.Padmore</p>
    </header>
    <main>
      <h1 id="title">Survey Form</h1>
      <p id="description">A survey</p>
      <form id="survey-form">
        <label id="name-label">Full Name:</label>
        <input id="name" type="text" placeholder="John Doe" required>
        <label id="email-label">Email:</label>
        <input type="email" id="email" required placeholder="example@gmail.com">
        <label id="number-label">Number:</label>
        <input type="number" id="number" placeholder="0257629897" min="10" max="13">
        <select id="dropdown">
          <option value="0202657013">0202657013</option>
          <option value="0552308173">0552308173</option>
        </select>
<label>Gender:
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female
      </label>

      <label><input type="checkbox" value="option1"> Option 1</label>
      <label><input type="checkbox" value="option2"> Option 2</label>

      <textarea id="comments" placeholder="Additional comments..."></textarea>

      <button type="submit" id="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
